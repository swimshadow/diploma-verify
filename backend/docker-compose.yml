# Бэкенды без publish портов: снаружи только Caddy :80 (/internal недоступен с хоста).
# Агрегатор OpenAPI (micro-swagga-label/docs_service внутри репо): http://localhost/docs
services:
  docs_service:
    build: ./docs_service
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      COMPOSE_SERVICE: docs_service
      CACHE_TTL: ${DOCS_AGGREGATOR_CACHE_TTL:-30}
    depends_on:
      auth-service:
        condition: service_started
      university-service:
        condition: service_started
      diploma-service:
        condition: service_started
      verify-service:
        condition: service_started
      file-service:
        condition: service_started
      certificate-service:
        condition: service_started
      ai-integration-service:
        condition: service_started
      notification-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  # Swagger: http://127.0.0.1:18001–18008/docs (только localhost)
  auth-service:
    build: ./auth-service
    labels:
      - "docs.route=/api"
      - "docs.port=8001"
    ports:
      - "127.0.0.1:18001:8001"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/authdb
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      NOTIFICATION_SERVICE_URL: http://notification-service:8008
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: on-failure

  university-service:
    build: ./university-service
    labels:
      - "docs.route=/api"
      - "docs.port=8002"
    ports:
      - "127.0.0.1:18002:8002"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/universitydb
      SECRET_SALT: ${SECRET_SALT}
      AUTH_SERVICE_URL: http://auth-service:8001
      FILE_SERVICE_URL: http://file-service:8005
      CERTIFICATE_SERVICE_URL: http://certificate-service:8006
      AI_SERVICE_URL: http://ai-integration-service:8007
      NOTIFICATION_SERVICE_URL: http://notification-service:8008
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
      UPLOAD_HTTP_TIMEOUT: ${UPLOAD_HTTP_TIMEOUT:-120}
      BLOCKCHAIN_SERVICE_URL: http://blockchain-service:8009
    depends_on:
      db-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
    restart: on-failure

  diploma-service:
    build: ./diploma-service
    labels:
      - "docs.route=/api"
      - "docs.port=8003"
    ports:
      - "127.0.0.1:18003:8003"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      UNIVERSITY_SERVICE_URL: http://university-service:8002
      CERTIFICATE_SERVICE_URL: http://certificate-service:8006
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
    depends_on:
      auth-service:
        condition: service_started
      university-service:
        condition: service_started
    restart: on-failure

  verify-service:
    build: ./verify-service
    labels:
      - "docs.route=/api"
      - "docs.port=8004"
    ports:
      - "127.0.0.1:18004:8004"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/verifydb
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_SALT: ${SECRET_SALT}
      UNIVERSITY_SERVICE_URL: http://university-service:8002
      CERTIFICATE_SERVICE_URL: http://certificate-service:8006
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
      BLOCKCHAIN_SERVICE_URL: http://blockchain-service:8009
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      university-service:
        condition: service_started
    restart: on-failure

  blockchain-service:
    build: ./blockchain-service
    ports:
      - "8009:8009"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hack:hack@postgres:5432/diplomadb}
    depends_on:
      postgres:
        condition: service_started
    restart: on-failure

  file-service:
    build: ./file-service
    labels:
      - "docs.route=/api"
      - "docs.port=8005"
    ports:
      - "127.0.0.1:18005:8005"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/filedb
      FILE_INTERNAL_DELETE_TOKEN: ${FILE_INTERNAL_DELETE_TOKEN:-}
    volumes:
      - diploma_uploads:/uploads
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

  certificate-service:
    build: ./certificate-service
    labels:
      - "docs.route=/api"
      - "docs.port=8006"
    ports:
      - "127.0.0.1:18006:8006"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/certdb
      VERIFY_PUBLIC_BASE_URL: ${VERIFY_PUBLIC_BASE_URL:-http://localhost:8000}
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

  ai-integration-service:
    build: ./ai-integration-service
    labels:
      - "docs.route=/api"
      - "docs.port=8007"
    ports:
      - "127.0.0.1:18007:8007"
    environment:
      FILE_SERVICE_URL: http://file-service:8005
      UNIVERSITY_SERVICE_URL: http://university-service:8002
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
      AI_FILE_FETCH_TIMEOUT: ${AI_FILE_FETCH_TIMEOUT:-120}
    depends_on:
      file-service:
        condition: service_started
      university-service:
        condition: service_started
    restart: on-failure

  notification-service:
    build: ./notification-service
    labels:
      - "docs.route=/api"
      - "docs.port=8008"
    ports:
      - "127.0.0.1:18008:8008"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/notificationdb
      AUTH_SERVICE_URL: http://auth-service:8001
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hack
      POSTGRES_PASSWORD: hack
      POSTGRES_DB: diplomadb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hack -d diplomadb"]
      interval: 3s
      timeout: 5s
      retries: 15

  db-init:
    build: ./db-init
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: hack
      POSTGRES_PASSWORD: hack
      POSTGRES_DB: diplomadb
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine

  admin-service:
    build: ./admin-service
    ports: ["8010:8010"]
    environment:
      AUTH_DATABASE_URL: postgresql://hack:hack@postgres:5432/authdb
      UNIVERSITY_DATABASE_URL: postgresql://hack:hack@postgres:5432/universitydb
      VERIFY_DATABASE_URL: postgresql://hack:hack@postgres:5432/verifydb
      AUTH_SERVICE_URL: http://auth-service:8001
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY}
    depends_on:
      postgres:
        condition: service_started
      auth-service:
        condition: service_started
    restart: on-failure

  caddy:
    image: caddy:2-alpine
    ports:
      - "8000:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../frontend:/srv:ro
      - diploma_uploads:/uploads
    depends_on:
      - docs_service
      - auth-service
      - university-service
      - diploma-service
      - verify-service
      - file-service
      - certificate-service
      - ai-integration-service
      - admin-service
      - notification-service

volumes:
  pgdata:
  diploma_uploads:

networks:
  default:
    name: diploma-network
