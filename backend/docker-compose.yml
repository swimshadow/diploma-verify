# Бэкенды без publish портов: снаружи только Caddy :80 (/internal недоступен с хоста).
# Агрегатор OpenAPI (micro-swagga-label/docs_service внутри репо): http://localhost/docs
services:
  # Swagger: http://127.0.0.1:18001–18008/docs (только localhost)
  auth-service:
    build: ./auth-service
    labels:
      - "docs.route=/api"
      - "docs.port=8001"
    ports:
      - "127.0.0.1:18001:8001"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/diplomadb
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      NOTIFICATION_SERVICE_URL: http://notification-service:8008
      DEMO_MODE: ${DEMO_MODE:-true}
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  university-service:
    build: ./university-service
    labels:
      - "docs.route=/api"
      - "docs.port=8002"
    ports:
      - "127.0.0.1:18002:8002"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/diplomadb
      SECRET_SALT: ${SECRET_SALT}
      AUTH_SERVICE_URL: http://auth-service:8001
      FILE_SERVICE_URL: http://file-service:8005
      CERTIFICATE_SERVICE_URL: http://certificate-service:8006
      AI_SERVICE_URL: http://ai-integration-service:8007
      NOTIFICATION_SERVICE_URL: http://notification-service:8008
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
      UPLOAD_HTTP_TIMEOUT: ${UPLOAD_HTTP_TIMEOUT:-120}
      BLOCKCHAIN_SERVICE_URL: http://blockchain-service:8009
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  diploma-service:
    build: ./diploma-service
    labels:
      - "docs.route=/api"
      - "docs.port=8003"
    ports:
      - "127.0.0.1:18003:8003"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      UNIVERSITY_SERVICE_URL: http://university-service:8002
      CERTIFICATE_SERVICE_URL: http://certificate-service:8006
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      auth-service:
        condition: service_started
      university-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  verify-service:
    build: ./verify-service
    labels:
      - "docs.route=/api"
      - "docs.port=8004"
    ports:
      - "127.0.0.1:18004:8004"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/diplomadb
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_SALT: ${SECRET_SALT}
      UNIVERSITY_SERVICE_URL: http://university-service:8002
      CERTIFICATE_SERVICE_URL: http://certificate-service:8006
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
      BLOCKCHAIN_SERVICE_URL: http://blockchain-service:8009
      NOTIFICATION_SERVICE_URL: http://notification-service:8008
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      university-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  blockchain-service:
    build: ./blockchain-service
    labels:
      - "docs.route=/api"
      - "docs.port=8009"
    ports:
      - "127.0.0.1:18009:8009"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hack:hack@postgres:5432/diplomadb}
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  file-service:
    build: ./file-service
    labels:
      - "docs.route=/api"
      - "docs.port=8005"
    ports:
      - "127.0.0.1:18005:8005"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/diplomadb
      FILE_INTERNAL_DELETE_TOKEN: ${FILE_INTERNAL_DELETE_TOKEN:-}
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - diploma_uploads:/uploads
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  certificate-service:
    build: ./certificate-service
    labels:
      - "docs.route=/api"
      - "docs.port=8006"
    ports:
      - "127.0.0.1:18006:8006"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/diplomadb
      VERIFY_PUBLIC_BASE_URL: ${VERIFY_PUBLIC_BASE_URL:-http://localhost:8000}
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  ai-integration-service:
    build: ./ai-integration-service
    labels:
      - "docs.route=/api"
      - "docs.port=8007"
    ports:
      - "127.0.0.1:18007:8007"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/diplomadb
      FILE_SERVICE_URL: http://file-service:8005
      UNIVERSITY_SERVICE_URL: http://university-service:8002
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
      AI_FILE_FETCH_TIMEOUT: ${AI_FILE_FETCH_TIMEOUT:-120}
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      file-service:
        condition: service_started
      university-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    labels:
      - "docs.route=/api"
      - "docs.port=8008"
    ports:
      - "127.0.0.1:18008:8008"
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/diplomadb
      AUTH_SERVICE_URL: http://auth-service:8001
      MAIL_SERVICE_URL: http://mail-service:8000
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-10}
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  mail-service:
    build: ./mail-service
    labels:
      - "docs.route=/api"
      - "docs.port=8000"
    ports: ["8011:8000"]
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      DEFAULT_SENDER: ${DEFAULT_SENDER}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hack
      POSTGRES_PASSWORD: hack
      POSTGRES_DB: diplomadb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hack -d diplomadb"]
      interval: 3s
      timeout: 5s
      retries: 15

  db-init:
    build: ./db-init
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: hack
      POSTGRES_PASSWORD: hack
      POSTGRES_DB: diplomadb
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine

  admin-service:
    build: ./admin-service
    labels:
      - "docs.route=/api"
      - "docs.port=8010"
    ports: ["8010:8010"]
    environment:
      DATABASE_URL: postgresql://hack:hack@postgres:5432/diplomadb
      AUTH_SERVICE_URL: http://auth-service:8001
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY}
      NOTIFICATION_SERVICE_URL: http://notification-service:8008
      UNIVERSITY_SERVICE_URL: http://university-service:8002
      PAYLOAD_ENCRYPTION_KEY: ${PAYLOAD_ENCRYPTION_KEY:-RGlwbG9tYVZlcmlmeUFFUzI1NlNlY3JldEtleTB4T0s=}
    volumes:
      - ./logs:/logs
      - ./shared/payload_crypto.py:/app/payload_crypto.py:ro
    depends_on:
      postgres:
        condition: service_started
      auth-service:
        condition: service_started
      notification-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  docs_service:
    build: ./docs_service
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      COMPOSE_SERVICE: docs_service
      CACHE_TTL: ${DOCS_AGGREGATOR_CACHE_TTL:-30}
    depends_on:
      auth-service:
        condition: service_started
      university-service:
        condition: service_started
      diploma-service:
        condition: service_started
      verify-service:
        condition: service_started
      file-service:
        condition: service_started
      certificate-service:
        condition: service_started
      ai-integration-service:
        condition: service_started
      notification-service:
        condition: service_started
      blockchain-service:
        condition: service_started
      admin-service:
        condition: service_started
      mail-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  demo-seeder:
    build: ./demo
    environment:
      API_BASE_URL: http://caddy:80
    depends_on:
      auth-service:
        condition: service_started
      university-service:
        condition: service_started
      file-service:
        condition: service_started
    profiles:
      - demo

  caddy:
    image: caddy:2-alpine
    ports:
      - "8000:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../frontend:/srv:ro
      - diploma_uploads:/uploads
    depends_on:
      - docs_service
      - auth-service
      - university-service
      - diploma-service
      - verify-service
      - file-service
      - certificate-service
      - ai-integration-service
      - admin-service
      - notification-service
      - blockchain-service
      - mail-service

volumes:
  pgdata:
  diploma_uploads:
  service_logs:

networks:
  default:
    name: diploma-network
