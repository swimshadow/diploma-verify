services:
  api:
    build: ./services/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/diplomas}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_SALT: ${SECRET_SALT:-change_me_random_string}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: diplomas
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine

  docs_service:
    build: ../../../micro-swagga-label/docs_service
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth_service:
    build: ../../../micro-swagga-label/auth_service
    labels:
      - "docs.route=/auth"
      - "docs.port=8002"
    expose:
      - "8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app_db
      - SERVICE_NAME=auth_service
    env_file:
      - ../../../micro-swagga-label/.env
    depends_on:
      db:
        condition: service_healthy

  user_service:
    build: ../../../micro-swagga-label/user_service
    labels:
      - "docs.route=/users"
      - "docs.port=8001"
    expose:
      - "8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app_db
      - SERVICE_NAME=user_service
    env_file:
      - ../../../micro-swagga-label/.env
    depends_on:
      db:
        condition: service_healthy

  products_service:
    build: ../../../micro-swagga-label/products_service
    labels:
      - "docs.route=/products"
      - "docs.port=8080"
    expose:
      - "8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  orders_service:
    build: ../../../micro-swagga-label/orders_service
    labels:
      - "docs.route=/orders"
      - "docs.port=3000"
    expose:
      - "3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  notifications_service:
    build: ../../../micro-swagga-label/notifications_service
    labels:
      - "docs.route=/notifications"
      - "docs.port=8003"
    expose:
      - "8003"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  reviews_service:
    build: ../../../micro-swagga-label/reviews_service
    labels:
      - "docs.route=/reviews"
      - "docs.port=8004"
    expose:
      - "8004"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  categories_service:
    build: ../../../micro-swagga-label/categories_service
    labels:
      - "docs.route=/categories"
      - "docs.port=3001"
    expose:
      - "3001"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  tags_service:
    build: ../../../micro-swagga-label/tags_service
    labels:
      - "docs.route=/tags"
      - "docs.port=3002"
    expose:
      - "3002"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  inventory_service:
    build: ../../../micro-swagga-label/inventory_service
    labels:
      - "docs.route=/inventory"
      - "docs.port=8085"
    expose:
      - "8085"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  shipping_service:
    build: ../../../micro-swagga-label/shipping_service
    labels:
      - "docs.route=/shipping"
      - "docs.port=5000"
    expose:
      - "5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  payments_service:
    build: ../../../micro-swagga-label/payments_service
    labels:
      - "docs.route=/payments"
      - "docs.port=8086"
    expose:
      - "8086"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  comments_service:
    build: ../../../micro-swagga-label/comments_service
    labels:
      - "docs.route=/comments"
      - "docs.port=3003"
      - "docs.openapi=/api/swagger_doc"
    expose:
      - "3003"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  coupons_service:
    build: ../../../micro-swagga-label/coupons_service
    labels:
      - "docs.route=/coupons"
      - "docs.port=8087"
      - "docs.openapi=/api/doc.json"
    expose:
      - "8087"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  analytics_service:
    build: ../../../micro-swagga-label/analytics_service
    labels:
      - "docs.route=/analytics"
      - "docs.port=8088"
    expose:
      - "8088"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=app_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
      - docs_service
      - auth_service
      - user_service
      - products_service
      - orders_service
      - notifications_service
      - reviews_service
      - categories_service
      - tags_service
      - inventory_service
      - shipping_service
      - payments_service
      - comments_service
      - coupons_service
      - analytics_service
    ports:
      - "80:80"
      - "8080:80"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./services/frontend:/var/www/html:ro

volumes:
  db-data:
  postgres_data:

